name: Create Release PR for containers

on:
  workflow_dispatch: {}
  push:
    branches:
      - main
    paths:
      - images/**

jobs:
  createReleasePR:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5
        with:
          skip-github-release: true
          token: ${{ secrets.ACTIONS_BOT_TOKEN }}
          config-file: .github/release-please/config.json
          manifest-file: .github/release-please/manifest.json
        id: release-please

      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
        if: ${{ steps.release-please.outputs.prs_created == 'true' }}

      - name: Set PRs to auto-merge
        if: ${{ steps.release-please.outputs.prs_created == 'true' }}
        run: |
          for pr_number in $(echo "${PR_NUMBERS}" | jq -r '.[]'); do
            gh pr merge --auto --squash "$pr_number"
          done
        env:
          GH_TOKEN: ${{ secrets.ACTIONS_BOT_TOKEN }}
          PR_NUMBERS: ${{ steps.release-please.outputs.pr_numbers }}
